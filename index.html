<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensaje Especial - Primavera Events Group</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <!-- Meta tags for SEO and sharing -->
    <meta name="description" content="arturo elias ayub envia mensaje para un amigo en rueda de prensa con carlos slim para richard hernandez director de primavera events group">
    
    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Un mensaje para Richard Hernández">
    <meta property="og:description" content="arturo elias ayub envia mensaje para un amigo en rueda de prensa con carlos slim para richard hernandez director de primavera events group">
    <meta property="og:image" content="destacada.jpg">
    <meta property="og:url" content=""> <!-- Will be filled by GitHub Pages -->

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Un mensaje para Richard Hernández">
    <meta name="twitter:description" content="arturo elias ayub envia mensaje para un amigo en rueda de prensa con carlos slim para richard hernandez director de primavera events group">
    <meta name="twitter:image" content="destacada.jpg">
</head>
<body>

    <div id="app">
        <!-- Cover Section -->
        <div id="cover-container">
            <div id="greeting-card">
                <h2>¡Felicidades Richard Hernández!</h2>
                <p>De parte de Alex Salomón,</p>
                <p>te mando un fuerte abrazo.</p>
            </div>
            <img src="sobrec.png" alt="Sobre de Invitación" id="envelope">
            <p class="instruction">Toca para abrir</p>
        </div>

        <!-- Video Section -->
        <div id="video-wrapper">
            <video id="intro-video" playsinline preload="auto">
                <source src="sobrev.mp4" type="video/mp4">
            </video>
            <video id="main-video" playsinline preload="auto" controls style="display: none;">
                <source src="video.mp4" type="video/mp4">
            </video>
        </div>
        <!-- Music Section -->
        <audio id="bg-music" loop>
            <source src="mañanitas.mp3" type="audio/mpeg">
        </audio>
        
        <button id="music-toggle" class="music-btn" aria-label="Controlar música">
            <svg id="play-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            <svg id="pause-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                <rect x="6" y="4" width="4" height="16"></rect>
                <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
        </button>
    </div>

    <script src="index.js"></script>
</body>
</html>
