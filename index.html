<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensaje Especial - Primavera Events Group</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <!-- Meta tags for SEO and sharing -->
    <meta name="description" content="arturo elias ayub envia mensaje para un amigo en rueda de prensa con carlos slim para richard hernandez director de primavera events group">
    
    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Un mensaje para Richard Hernández">
    <meta property="og:description" content="arturo elias ayub envia mensaje para un amigo en rueda de prensa con carlos slim para richard hernandez director de primavera events group">
    <meta property="og:image" content="https://5410m0n0c001.github.io/feliz-cumplea-os-richard-/destacada.jpg">
    <meta property="og:url" content="https://5410m0n0c001.github.io/feliz-cumplea-os-richard-/">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Un mensaje para Richard Hernández">
    <meta name="twitter:description" content="arturo elias ayub envia mensaje para un amigo en rueda de prensa con carlos slim para richard hernandez director de primavera events group">
    <meta name="twitter:image" content="https://5410m0n0c001.github.io/feliz-cumplea-os-richard-/destacada.jpg">
</head>
<body>

    <div id="app">
        <!-- Cover Section -->
        <div id="cover-container">
            <img src="sobrec.png" alt="Sobre de Invitación" id="envelope">
            <p class="instruction">Toca para abrir</p>
        </div>

        <!-- Video Section -->
        <div id="video-wrapper">
            <div id="greeting-card" style="opacity: 0;">
                <h2>¡Felicidades Richard Hernández!</h2>
                <p>De parte de Alex Salomón,</p>
                <p>te mando un fuerte abrazo.</p>
            </div>
            <video id="intro-video" playsinline preload="auto">
                <source src="sobrev.mp4" type="video/mp4">
            </video>
            <video id="main-video" playsinline preload="none" style="display: none;">
                <source src="video.mp4" type="video/mp4">
            </video>
        </div>
        <!-- Music Section -->
        <audio id="bg-music" loop>
            <source src="mañanitas.mp3" type="audio/mpeg">
        </audio>
        
        <div class="floating-controls">
            <button id="music-toggle" class="control-btn" aria-label="Controlar música">
                <svg id="play-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
                <svg id="pause-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                    <rect x="6" y="4" width="4" height="16"></rect>
                    <rect x="14" y="4" width="4" height="16"></rect>
                </svg>
            </button>

            <button id="video-toggle" class="control-btn" aria-label="Controlar video" style="display: none;">
                <svg id="v-play-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 7l-7 5 7 5V7z"></path>
                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                </svg>
                <svg id="v-pause-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                    <rect x="6" y="4" width="4" height="16"></rect>
                    <rect x="14" y="4" width="4" height="16"></rect>
                </svg>
            </button>

            <button id="tour-btn" class="control-btn" aria-label="Mostrar visita guiada">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="16" x2="12" y2="12"></line>
                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>
            </button>

            <button id="share-btn" class="control-btn" aria-label="Compartir invitación">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
                    <polyline points="16 6 12 2 8 6"></polyline>
                    <line x1="12" y1="2" x2="12" y2="15"></line>
                </svg>
            </button>
        </div>

        <!-- Tour Overlay & Spotlight -->
        <div id="tour-overlay" class="tour-overlay" style="display: none;">
            <svg id="tour-spotlight-svg">
                <defs>
                    <mask id="spotlight-mask">
                        <rect width="100%" height="100%" fill="white" />
                        <rect id="spotlight-hole" x="0" y="0" width="0" height="0" rx="10" fill="black" />
                    </mask>
                </defs>
                <rect width="100%" height="100%" fill="rgba(0,0,0,0.7)" mask="url(#spotlight-mask)" />
            </svg>

            <div class="tour-card">
                <div id="tour-content">
                    <h3 id="tour-title">Bienvenido</h3>
                    <p id="tour-text">Cargando...</p>
                </div>
                <div class="tour-footer">
                    <button id="tour-prev" class="tour-nav-btn">Anterior</button>
                    <button id="tour-next" class="tour-nav-btn">Siguiente</button>
                </div>
                <button id="tour-close" class="tour-close-btn">&times;</button>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
